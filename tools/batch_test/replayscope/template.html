<title>ReplayScope — bot vision review</title>
<style>
  :root{
    --bg:#0b0e13; --panel:#11151c; --panel-2:#161b24; --line:#232b38;
    --ink:#e6ecf4; --ink-dim:#8b97a8; --ink-faint:#586474;
    --radiant:#46c08a; --radiant-dim:#20493b;
    --dire:#e0574f; --dire-dim:#4a2420;
    --amber:#f0b429; --fog:#3a4048;
    --mono:ui-monospace,"SF Mono","JetBrains Mono",Menlo,Consolas,monospace;
    --sans:system-ui,-apple-system,"Segoe UI",Roboto,sans-serif;
  }
  *{box-sizing:border-box}
  html,body{margin:0;height:100%;background:var(--bg);color:var(--ink);font-family:var(--sans);
    -webkit-font-smoothing:antialiased}
  body{display:flex;flex-direction:column;min-height:100vh}
  header{display:flex;align-items:baseline;gap:14px;padding:12px 18px;border-bottom:1px solid var(--line);
    background:linear-gradient(180deg,var(--panel-2),var(--panel))}
  header h1{margin:0;font-size:15px;letter-spacing:.14em;text-transform:uppercase;font-weight:600}
  header .sub{font-family:var(--mono);font-size:12px;color:var(--ink-dim)}
  header .spacer{flex:1}
  .clock{font-family:var(--mono);font-size:20px;font-variant-numeric:tabular-nums;color:var(--amber);font-weight:600}
  main{flex:1;display:grid;grid-template-columns:minmax(340px,1fr) minmax(300px,460px);gap:14px;padding:14px;min-height:0}
  @media (max-width:880px){main{grid-template-columns:1fr;overflow:auto}}
  .card{background:var(--panel);border:1px solid var(--line);border-radius:10px;overflow:hidden;display:flex;flex-direction:column;min-height:0}
  .card > .hd{display:flex;align-items:center;gap:10px;padding:9px 13px;border-bottom:1px solid var(--line);
    font-size:11px;letter-spacing:.12em;text-transform:uppercase;color:var(--ink-dim)}
  /* map panel is kept SQUARE regardless of card shape */
  #mapwrap{position:relative;flex:1;min-height:280px;display:flex;align-items:center;justify-content:center;padding:8px}
  #map{border-radius:6px;background:#090c11;display:block}
  .tablewrap{overflow:auto}
  table{border-collapse:collapse;width:100%;font-family:var(--mono);font-size:12px}
  th,td{padding:7px 12px;text-align:right;white-space:nowrap;border-bottom:1px solid var(--line);
    font-variant-numeric:tabular-nums}
  th{position:sticky;top:0;background:var(--panel-2);color:var(--ink-faint);font-weight:500;
    text-transform:uppercase;letter-spacing:.08em;font-size:10px;text-align:right}
  th:first-child,td:first-child{text-align:left}
  td.hero{font-family:var(--sans);font-weight:600;display:flex;align-items:center;gap:8px}
  td.hero img{width:22px;height:22px;border-radius:50%;background:#12161d;flex:none}
  tr.rad td.hero{color:var(--radiant)} tr.dire td.hero{color:var(--dire)}
  tr.rad td.hero img{box-shadow:0 0 0 1.5px var(--radiant)} tr.dire td.hero img{box-shadow:0 0 0 1.5px var(--dire)}
  tr.fogged{opacity:.42} tr.fogged td.hero::after{content:"fog";color:var(--ink-faint);font-weight:400;font-size:10px;letter-spacing:.08em}
  tr.dead td{color:var(--ink-faint)} tr.dead td.hero::after{content:"dead";color:var(--dire);font-weight:400;font-size:10px;letter-spacing:.08em}
  td.hp{color:var(--radiant)} td.mp{color:var(--amber)}
  tr.fogged td.hp,tr.fogged td.mp,tr.dead td.hp,tr.dead td.mp{color:var(--ink-faint)}
  footer{border-top:1px solid var(--line);background:var(--panel);padding:12px 18px;display:flex;flex-direction:column;gap:10px}
  .scrub{display:flex;align-items:center;gap:12px}
  button{font-family:var(--sans);font-size:12px;color:var(--ink);background:var(--panel-2);border:1px solid var(--line);
    border-radius:7px;padding:7px 12px;cursor:pointer;letter-spacing:.02em}
  button:hover{border-color:var(--ink-faint)} button:focus-visible{outline:2px solid var(--amber);outline-offset:2px}
  button.pri{background:var(--amber);color:#1a1204;border-color:var(--amber);font-weight:600}
  input[type=range]{flex:1;accent-color:var(--amber);height:5px}
  .controls{display:flex;align-items:center;gap:18px;flex-wrap:wrap}
  .seg{display:inline-flex;border:1px solid var(--line);border-radius:7px;overflow:hidden}
  .seg button{border:0;border-radius:0;background:transparent;padding:6px 12px;color:var(--ink-dim)}
  .seg button[aria-pressed=true]{background:var(--panel-2);color:var(--ink)}
  .seg button[data-v=radiant][aria-pressed=true]{color:var(--radiant);box-shadow:inset 0 -2px var(--radiant)}
  .seg button[data-v=dire][aria-pressed=true]{color:var(--dire);box-shadow:inset 0 -2px var(--dire)}
  .seg button[data-v=global][aria-pressed=true]{color:var(--amber);box-shadow:inset 0 -2px var(--amber)}
  .lbl{font-size:10px;letter-spacing:.12em;text-transform:uppercase;color:var(--ink-faint)}
  .legend{display:flex;gap:16px;font-family:var(--mono);font-size:11px;color:var(--ink-dim);align-items:center;flex-wrap:wrap}
  .dot{width:9px;height:9px;border-radius:50%;display:inline-block;margin-right:5px;vertical-align:middle}
  dialog{background:var(--panel);color:var(--ink);border:1px solid var(--line);border-radius:10px;max-width:min(760px,92vw);padding:0}
  dialog::backdrop{background:rgba(0,0,0,.6)}
  dialog .hd{padding:11px 15px;border-bottom:1px solid var(--line);display:flex;gap:10px;align-items:center}
  dialog pre{margin:0;padding:15px;max-height:60vh;overflow:auto;font-family:var(--mono);font-size:12px;line-height:1.5;color:#cfe4d8}
  .hint{font-family:var(--mono);font-size:11px;color:var(--ink-faint)}
  select{font-family:var(--mono);font-size:12px;background:var(--panel-2);color:var(--ink);border:1px solid var(--line);border-radius:6px;padding:5px 8px}
</style>

<header>
  <h1>ReplayScope</h1>
  <span class="sub" id="gid">no game loaded</span>
  <span class="spacer"></span>
  <span class="lbl">game time</span>
  <span class="clock" id="clock">0:00</span>
</header>

<main>
  <section class="card">
    <div class="hd"><span>Map</span><span class="spacer" style="flex:1"></span>
      <span class="legend">
        <span><i class="dot" style="background:var(--radiant)"></i>radiant</span>
        <span><i class="dot" style="background:var(--dire)"></i>dire</span>
        <span><i class="dot" style="background:var(--fog)"></i>last-seen (fog)</span>
      </span>
    </div>
    <div id="mapwrap"><canvas id="map"></canvas></div>
  </section>

  <section class="card">
    <div class="hd"><span>State table</span><span class="spacer" style="flex:1"></span>
      <span class="hint" id="persphint">global — all units</span></div>
    <div class="tablewrap"><table id="tbl"><thead><tr>
      <th>hero</th><th>lvl</th><th>hp</th><th>mp</th>
    </tr></thead><tbody id="tbody"></tbody></table></div>
  </section>
</main>

<footer>
  <div class="scrub">
    <button id="play" class="pri" aria-label="Play/pause">▶ play</button>
    <input type="range" id="slider" min="0" max="0" value="0" step="1" aria-label="Timeline">
    <button id="step-b" title="back 1s">‹</button>
    <button id="step-f" title="forward 1s">›</button>
  </div>
  <div class="controls">
    <span class="lbl">vision</span>
    <div class="seg" id="persp" role="group" aria-label="Vision perspective">
      <button data-v="global" aria-pressed="true">Global</button>
      <button data-v="radiant" aria-pressed="false">Radiant</button>
      <button data-v="dire" aria-pressed="false">Dire</button>
    </div>
    <span class="spacer" style="flex:1"></span>
    <span class="lbl">export</span>
    <select id="exphero" aria-label="Hero to export"></select>
    <button id="export">⤓ Lua test fixture</button>
  </div>
</footer>

<dialog id="dlg">
  <div class="hd"><strong>Lua unit-test fixture</strong>
    <span class="hint" id="dlgsub"></span><span class="spacer" style="flex:1"></span>
    <button id="copy">Copy</button><button id="dlgx">Close</button></div>
  <pre id="dlgpre"></pre>
</dialog>

<script>/*__REPLAYSCOPE_INJECT__*/</script>
<script>
/* ReplayScope renderer. Data + icons are injected by tools/batch_test/replayscope/build.py
   as window.__REPLAY__ and window.__ICONS__. The tiny fallback below only exists so the
   bare template renders standalone. Schema (compact, one object per tick):
     meta:{game_id,duration_s,tick_s,vision}  bounds:{min,max}  ancients:{radiant,dire}
     towers:[{name,team,x,y,die_t}]
     ticks:[{ t, heroes:[{name,team,x,y,hp,mhp,mp,lvl,alive,items?,vis?}],
              creeps:[[x,y,team],...] }]                                                    */
const DATA = window.__REPLAY__ || {
  meta:{game_id:"sample (synthetic)", duration_s:60, tick_s:1, vision:"approx"},
  bounds:{min:-8300,max:8300},
  ancients:{radiant:[-7205,-6610], dire:[7137,6474]}, towers:[],
  ticks:(()=>{const T=[];for(let t=0;t<=60;t++){const a=t/60;
    T.push({t, heroes:[
      {name:"lion",team:2,x:-6000+a*9000,y:-5600+a*8000,hp:Math.round(560*(1-a*.3)),mhp:560,mp:.8,lvl:1+((a*6)|0),alive:true},
      {name:"sniper",team:2,x:-5000+a*3000,y:-5200+a*3000,hp:600,mhp:600,mp:.6,lvl:1+((a*5)|0),alive:true},
      {name:"queen_of_pain",team:3,x:6000-a*7000,y:6000-a*7000,hp:Math.round(580*(1-a*.2)),mhp:580,mp:.5,lvl:1+((a*7)|0),alive:true},
      {name:"drow_ranger",team:3,x:5200-a*2000,y:5600-a*2000,hp:540,mhp:540,mp:.4,lvl:1+((a*6)|0),alive:true},
    ], creeps:[]});}
    return T;})()
};
const ICONS = {};
(function(){const src=window.__ICONS__||{};for(const k in src){const im=new Image();im.src=src[k];ICONS[k]=im;}})();

const cv=document.getElementById('map'), cx=cv.getContext('2d');
const B=DATA.bounds||{min:-8300,max:8300};
const RAD=2, DIRE=3;
let i=0, persp="global", playing=false, raf=null, sc=1;
const ticks=DATA.ticks; const lastSeen={}; // name -> last visible snapshot (for ghosts)
const hasFog = ticks.some(tk=>tk.heroes.some(h=>h.vis));  // real fog data present?

const slider=document.getElementById('slider'); slider.max=ticks.length-1;
const clock=document.getElementById('clock'), tbody=document.getElementById('tbody');
const exphero=document.getElementById('exphero');

function fmt(t){t=Math.round(t);return Math.floor(t/60)+":"+String(t%60).padStart(2,'0');}
function W(){return cv.width} function H(){return cv.height}
function sx(x){return (x-B.min)/(B.max-B.min)*W();}
function sy(y){return H()-(y-B.min)/(B.max-B.min)*H();}
function teamCol(t){return t===RAD?getCss('--radiant'):getCss('--dire');}
function getCss(v){return getComputedStyle(document.documentElement).getPropertyValue(v).trim();}
function code(n){return n.replace(/_/g,' ').split(' ').map(w=>w[0]).join('').slice(0,3).toUpperCase();}

/* keep the canvas a crisp SQUARE that fits the card, independent of card proportions */
function fitCanvas(){
  const wrap=document.getElementById('mapwrap');
  const s=Math.max(200,Math.floor(Math.min(wrap.clientWidth,wrap.clientHeight)));
  sc=window.devicePixelRatio||1;
  cv.style.width=s+'px'; cv.style.height=s+'px';
  cv.width=Math.round(s*sc); cv.height=Math.round(s*sc);
  if(ticks) render();
}

function myTeam(){return persp==="radiant"?RAD:DIRE;}
function nearMine(x,y,me){const tk=ticks[i];return tk.heroes.some(m=>m.team===me&&m.alive&&Math.hypot(m.x-x,m.y-y)<1600);}
function heroVisible(h){
  if(persp==="global") return true;
  const me=myTeam();
  if(h.team===me) return true;
  if(hasFog) return !!(h.vis && h.vis.includes(me));       // real reconstructed fog
  return nearMine(h.x,h.y,me);                              // approx: within 1600 of an ally
}

function drawMap(){
  const tk=ticks[i];
  cx.clearRect(0,0,W(),H());
  // river midline x+y=0
  cx.strokeStyle="rgba(120,150,200,.16)";cx.lineWidth=1.5*sc;cx.setLineDash([7*sc,7*sc]);
  cx.beginPath();cx.moveTo(sx(B.min),sy(-B.min));cx.lineTo(sx(B.max),sy(-B.max));cx.stroke();cx.setLineDash([]);
  // creeps -> small dots
  if(tk.creeps){for(const c of tk.creeps){
    if(persp!=="global"){const me=myTeam(); if(c[2]!==me && !nearMine(c[0],c[1],me)) continue;}
    cx.beginPath();cx.arc(sx(c[0]),sy(c[1]),2.2*sc,0,7);
    cx.fillStyle=c[2]===RAD?getCss('--radiant'):getCss('--dire');cx.globalAlpha=.6;cx.fill();cx.globalAlpha=1;}}
  // towers (greyed when dead; no HP annotation)
  for(const tw of (DATA.towers||[])){const dead=tw.die_t!=null&&tk.t>=tw.die_t;
    cx.fillStyle=dead?getCss('--fog'):teamCol(tw.team); cx.globalAlpha=dead?.4:.9;
    cx.fillRect(sx(tw.x)-4*sc,sy(tw.y)-4*sc,8*sc,8*sc); cx.globalAlpha=1;
    if(dead){cx.strokeStyle="#000";cx.lineWidth=1*sc;cx.beginPath();
      cx.moveTo(sx(tw.x)-4*sc,sy(tw.y)-4*sc);cx.lineTo(sx(tw.x)+4*sc,sy(tw.y)+4*sc);cx.stroke();}}
  // ancients
  for(const [k,p] of Object.entries(DATA.ancients||{})){const t=k==="radiant"?RAD:DIRE;
    cx.fillStyle=teamCol(t);cx.globalAlpha=.85;star(sx(p[0]),sy(p[1]),9*sc);cx.globalAlpha=1;}
  // heroes: portrait icons (or last-seen ghosts under fog)
  for(const h of tk.heroes){
    const vis=heroVisible(h);
    if(vis && h.alive){ lastSeen[h.name]={t:tk.t,x:h.x,y:h.y,hero:h}; drawHero(h); }
    else if(vis && !h.alive){ drawHero(h); }               // own dead hero still shown (global/own)
    else { const g=lastSeen[h.name]; if(g && persp!=="global") drawGhost(g); }
  }
}

function drawHero(h){
  const X=sx(h.x),Y=sy(h.y),R=13*sc;
  cx.globalAlpha=h.alive?1:.4;
  // team ring
  cx.beginPath();cx.arc(X,Y,R+2*sc,0,7);cx.fillStyle=teamCol(h.team);cx.fill();
  const img=ICONS[h.name];
  if(img && img.complete && img.naturalWidth){
    cx.save();cx.beginPath();cx.arc(X,Y,R,0,7);cx.clip();
    cx.drawImage(img,X-R,Y-R,2*R,2*R);cx.restore();
  }else{
    cx.beginPath();cx.arc(X,Y,R,0,7);cx.fillStyle="#12161d";cx.fill();
    cx.fillStyle=getCss('--ink');cx.font=`700 ${9*sc}px ${getCss('--sans')}`;
    cx.textAlign="center";cx.textBaseline="middle";cx.fillText(code(h.name),X,Y);
  }
  if(!h.alive){ // dead marker
    cx.strokeStyle=getCss('--dire');cx.lineWidth=2*sc;
    cx.beginPath();cx.moveTo(X-R*.7,Y-R*.7);cx.lineTo(X+R*.7,Y+R*.7);
    cx.moveTo(X+R*.7,Y-R*.7);cx.lineTo(X-R*.7,Y+R*.7);cx.stroke();
  }
  // items alongside the hero (only when the dump carries them; inert on position-only dumps)
  if(h.items&&h.items.length) drawItems(h.items,X,Y,R);
  cx.globalAlpha=1;
}
function drawItems(items,X,Y,R){
  const n=Math.min(items.length,6), s=5*sc, gap=1*sc, tot=n*(s+gap)-gap;
  let ox=X-tot/2, oy=Y+R+3*sc;
  cx.textAlign="center";cx.textBaseline="middle";cx.font=`${4*sc}px ${getCss('--mono')}`;
  for(let k=0;k<n;k++){const it=items[k];
    cx.fillStyle="rgba(20,26,36,.92)";cx.fillRect(ox,oy,s,s);
    cx.strokeStyle="rgba(140,152,168,.5)";cx.lineWidth=.5*sc;cx.strokeRect(ox,oy,s,s);
    cx.fillStyle=getCss('--ink-dim');cx.fillText((it[0]||'?').toUpperCase(),ox+s/2,oy+s/2);
    ox+=s+gap;}
}
function drawGhost(g){const X=sx(g.x),Y=sy(g.y),R=12*sc;
  cx.globalAlpha=.5;cx.setLineDash([3*sc,3*sc]);cx.strokeStyle=getCss('--fog');cx.lineWidth=1.5*sc;
  cx.beginPath();cx.arc(X,Y,R,0,7);cx.stroke();cx.setLineDash([]);
  const img=ICONS[g.hero.name];
  if(img&&img.complete&&img.naturalWidth){cx.save();cx.globalAlpha=.28;cx.beginPath();cx.arc(X,Y,R,0,7);cx.clip();
    cx.drawImage(img,X-R,Y-R,2*R,2*R);cx.restore();}
  cx.globalAlpha=.6;cx.fillStyle=getCss('--ink-faint');cx.font=`${9*sc}px ${getCss('--mono')}`;
  cx.textAlign="left";cx.textBaseline="middle";cx.fillText("@"+fmt(g.t),X+R+3*sc,Y);cx.globalAlpha=1;}
function star(X,Y,r){cx.beginPath();for(let k=0;k<10;k++){const a=Math.PI/5*k-Math.PI/2;const rr=k%2?r*.45:r;cx.lineTo(X+Math.cos(a)*rr,Y+Math.sin(a)*rr);}cx.closePath();cx.fill();}
function pretty(n){return n.replace(/^npc_dota_hero_/,'').replace(/_/g,' ').replace(/\b\w/g,c=>c.toUpperCase());}

function drawTable(){
  const tk=ticks[i]; tbody.innerHTML="";
  const rows=[...tk.heroes].sort((a,b)=>a.team-b.team||a.name.localeCompare(b.name));
  for(const h of rows){
    const vis=heroVisible(h); const seen=lastSeen[h.name];
    const src = vis? h : (seen? seen.hero : h);            // fogged enemy => last-seen snapshot
    const tr=document.createElement('tr');
    tr.className=(h.team===RAD?"rad":"dire")+(!h.alive?" dead":"")+(!vis?" fogged":"");
    const ic=window.__ICONS__&&window.__ICONS__[h.name]?`<img src="${window.__ICONS__[h.name]}" alt="">`:'';
    const hp = (!h.alive)?"0/"+(src.mhp||0):(src.hp!=null?src.hp+"/"+(src.mhp||src.hp):"—");
    const mp = src.mp!=null?Math.round(src.mp*100)+"%":"—";
    tr.innerHTML=`<td class="hero">${ic}<span>${pretty(h.name)}</span></td>
      <td>${src.lvl??'—'}</td>
      <td class="hp">${hp}</td>
      <td class="mp">${mp}</td>`;
    tbody.appendChild(tr);
  }
}

function render(){clock.textContent=fmt(ticks[i].t);slider.value=i;drawMap();drawTable();
  const note = hasFog?"":" · vision approx (no fog data)";
  document.getElementById('persphint').textContent =
    (persp==="global"?"global — omniscient":persp+" — only what "+persp+" sees")+note;}

function setTick(n){i=Math.max(0,Math.min(ticks.length-1,n));render();}
slider.addEventListener('input',e=>setTick(+e.target.value));
document.getElementById('step-f').onclick=()=>setTick(i+1);
document.getElementById('step-b').onclick=()=>setTick(i-1);
document.getElementById('play').onclick=function(){playing=!playing;this.textContent=playing?"❚❚ pause":"▶ play";
  if(playing)loop();else cancelAnimationFrame(raf);};
let acc=0,last=0;
function loop(ts){if(!playing)return;if(!last)last=ts;acc+=(ts-last)/1000;last=ts;
  if(acc>=0.4){acc=0;if(i>=ticks.length-1){playing=false;last=0;document.getElementById('play').textContent="▶ play";return;}setTick(i+1);}
  raf=requestAnimationFrame(loop);}
document.getElementById('persp').addEventListener('click',e=>{const b=e.target.closest('button');if(!b)return;
  persp=b.dataset.v;[...e.currentTarget.children].forEach(x=>x.setAttribute('aria-pressed',x===b));render();});
addEventListener('keydown',e=>{if(e.key==='ArrowRight')setTick(i+1);if(e.key==='ArrowLeft')setTick(i-1);
  if(e.key===' '){e.preventDefault();document.getElementById('play').click();}});

/* ---- Lua fixture export: emit the world as THIS perspective's hero would see it --- */
function luaFixture(heroName){
  const tk=ticks[i]; const me = tk.heroes.find(h=>h.name===heroName)?.team;
  const persTeam = persp==="global"? me : myTeam();
  const vis = tk.heroes.filter(h=> h.name===heroName || h.team===persTeam ||
    (hasFog? (h.vis&&h.vis.includes(persTeam)) : nearMine(h.x,h.y,persTeam)));
  const q=s=>"'"+String(s).replace(/'/g,"")+"'";
  let L=[];
  L.push("-- ReplayScope fixture — "+DATA.meta.game_id+" @ "+fmt(tk.t)+"  (perspective: team "+persTeam+")");
  L.push("-- Reconstructs the bot API world "+pretty(heroName)+" saw at this instant.");
  L.push("-- Feed into tests/mock/bot_api.lua: MakeHero per unit, install, call the Consider fn, assert.");
  L.push("return {");
  L.push("  time = "+tk.t+", perspective_team = "+persTeam+",");
  L.push("  self = "+q("npc_dota_hero_"+heroName)+",");
  L.push("  units = {");
  for(const h of vis){
    const hp_pct=(h.mhp?(h.hp/h.mhp):1);
    L.push("    { name="+q("npc_dota_hero_"+h.name)+", team="+h.team+
      ", loc={"+Math.round(h.x)+","+Math.round(h.y)+",0}, hp="+(h.hp??0)+", max_hp="+(h.mhp??0)+
      ", hp_pct="+hp_pct.toFixed(2)+", mp_pct="+(h.mp??1).toFixed(2)+", level="+(h.lvl??1)+", alive="+(h.alive!==false)+" },");
  }
  L.push("  },");
  L.push("}");
  return L.join("\n");
}
function refreshHeroSel(){exphero.innerHTML="";const seen=new Set();
  for(const h of ticks[0].heroes){if(seen.has(h.name))continue;seen.add(h.name);
    const o=document.createElement('option');o.value=h.name;o.textContent=pretty(h.name)+" ("+(h.team===RAD?"R":"D")+")";exphero.appendChild(o);}}
const dlg=document.getElementById('dlg');
