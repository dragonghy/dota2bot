name: CI

on:
  push:
    branches: ['**']
  pull_request:

jobs:
  luacheck:
    name: Luacheck (static analysis)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install luacheck
        run: sudo apt-get update && sudo apt-get install -y lua-check
      - name: Run luacheck
        run: luacheck bots game --formatter plain

  tests:
    name: Unit tests (mock Bot API)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install Lua 5.1
        run: sudo apt-get update && sudo apt-get install -y lua5.1
      - name: Run tests
        run: lua5.1 tests/run_tests.lua
